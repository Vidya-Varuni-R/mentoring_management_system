
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MentorSpace – Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage:      #4a7c59;
      --sage-d:    #3a6146;
      --sage-l:    #6a9e7a;
      --mint:      #d4edda;
      --forest:    #1e3a2a;
      --gold:      #c9a84c;
      --gold-l:    #f0d080;
      --cream:     #faf8f4;
      --card:      #ffffff;
      --txt:       #1a2e22;
      --muted:     #6b7f72;
      --border:    #dde8e0;
      --red:       #e05252;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--cream);
    }

    /* ── Left panel ── */
    .left {
      background: linear-gradient(155deg, var(--forest) 0%, var(--sage-d) 60%, var(--sage-l) 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 4rem;
      position: relative;
      overflow: hidden;
    }
    .left::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      top: -100px; right: -100px;
    }
    .left::after {
      content: '';
      position: absolute;
      width: 250px; height: 250px;
      border-radius: 50%;
      background: rgba(201,168,76,0.12);
      bottom: -60px; left: -60px;
    }
    .left-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 3.5rem;
      position: relative; z-index: 1;
    }
    .left-logo-icon {
      width: 64px; height: 64px;
      border-radius: 18px;
      background: var(--gold);
      color: var(--forest);
      font-weight: 800;
      font-size: 1.7rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .left-logo-text { color: #fff; }
    .left-logo-text .name { font-size: 1.4rem; font-weight: 800; letter-spacing: 0.02em; }
    .left-logo-text .sub  { font-size: 0.75rem; opacity: 0.7; margin-top: 1px; }
    .left-headline {
      color: #fff;
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1.2rem;
      position: relative; z-index: 1;
    }
    .left-headline span { color: var(--gold-l); }
    .left-sub {
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      line-height: 1.6;
      max-width: 360px;
      position: relative; z-index: 1;
    }
    .left-pills {
      display: flex;
      gap: 10px;
      margin-top: 2.5rem;
      flex-wrap: wrap;
      position: relative; z-index: 1;
    }
    .left-pill {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.85);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 0.78rem;
      font-weight: 500;
    }

    /* ── Right panel ── */
    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }
    .login-card {
      background: var(--card);
      border-radius: 24px;
      padding: 3rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 40px rgba(30,58,42,0.08);
      border: 1px solid var(--border);
    }
    .card-title { font-size: 1.6rem; font-weight: 700; color: var(--txt); margin-bottom: 6px; }
    .card-sub   { font-size: 0.9rem; color: var(--muted); margin-bottom: 2rem; }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      color: var(--red);
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .field { margin-bottom: 1.2rem; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--txt); margin-bottom: 6px; }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      color: var(--txt);
      background: var(--cream);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px rgba(74,124,89,0.12);
      background: #fff;
    }

    .btn-signin {
      width: 100%;
      padding: 13px;
      background: var(--sage);
      color: #fff;
      border: none;
      border-radius: 11px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.4rem;
      font-family: 'Inter', sans-serif;
    }
    .btn-signin:hover  { background: var(--sage-d); }
    .btn-signin:active { transform: scale(0.99); }

    .card-footer {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .creds-hint {
      background: #f0faf4;
      border: 1px solid #c3e6d0;
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 1.6rem;
      font-size: 0.76rem;
      color: var(--sage-d);
      line-height: 1.7;
    }
    .creds-hint strong { display: block; margin-bottom: 4px; color: var(--sage-d); }

    @media (max-width: 820px) {
      body { grid-template-columns: 1fr; }
      .left { display: none; }
    }
  </style>
</head>
<body>

<!-- Left branding panel -->
<div class="left">
  <div class="left-logo">
    <div class="left-logo-icon">M</div>
    <div class="left-logo-text">
      <p class="name">MentorSpace</p>
      <p class="sub">SSN College of Engineering</p>
    </div>
  </div>
  <p class="left-sub">A unified platform for mentors, mentees, and academic managers to coordinate, schedule meetings, and monitor student progress.</p>

</div>

<!-- Right login panel -->
<div class="right">
  <div class="login-card">
    <h1 class="card-title">Welcome back</h1>
    <p class="card-sub">Sign in to access your dashboard</p>

    {% if error %}
    <div class="error-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-signin">Sign In →</button>
    </form>

   

  
  </div>
</div>

</body>
</html>
